services:
  postgres:
    image: postgres:16-alpine
    container_name: ruralmed-postgres
    environment:
      POSTGRES_DB: ruralmed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ruralmed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ruralmed-backend
    shm_size: '2g'          # Required for PyTorch multi-process embedding pool
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ruralmed
      AES_256_KEY: ${AES_256_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      USE_LOCAL_ML: ${USE_LOCAL_ML:-false}
      ML_NODE_URL: ${ML_NODE_URL:-ws://ml-service:8002/ws/process-audio}
    env_file:
      - .env
    ports:
      - "8003:8003"
    volumes:
      - backend_data:/app/backend/data   # Persist ChromaDB — no re-indexing on restart
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started

  ml-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    container_name: ruralmed-ml-service
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLAMA_MODEL_PATH: ${LLAMA_MODEL_PATH:-/models/Qwen3.5-2B-UD-Q4_K_XL.gguf}
      LLAMA_MODEL_URL: ${LLAMA_MODEL_URL:-}
      LLAMA_PORT: ${LLAMA_PORT:-8081}
      ML_PORT: ${ML_PORT:-8002}
    env_file:
      - .env
    ports:
      - "8002:8002"
      - "8081:8081"
    volumes:
      - ml_models:/models

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ruralmed-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8003
      NEXT_PUBLIC_WS_URL: ws://backend:8003/ws/live-consultation
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
  ml_models:
